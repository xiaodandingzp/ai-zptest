<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zpp测试页面</title>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        /* 左侧菜单栏 */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #34495e;
            font-size: 20px;
            font-weight: bold;
        }
        
        .sidebar-menu {
            flex: 1;
            padding: 20px 0;
        }
        
        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .menu-item:hover {
            background: #34495e;
        }
        
        .menu-item.active {
            background: #3498db;
        }
        
        .menu-icon {
            font-size: 18px;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        .content-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
            font-weight: 500;
            flex-shrink: 0;
        }
        
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }
        
        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }
        
        /* 对话页面样式 */
        .chat-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.assistant {
            align-items: flex-start;
        }
        
        .message.error {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        /* Markdown 样式 */
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            line-height: 1.3;
        }
        
        .message-content h1 { font-size: 1.4em; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
        .message-content h2 { font-size: 1.2em; }
        .message-content h3 { font-size: 1.1em; }
        
        .message-content p {
            margin: 8px 0;
        }
        
        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        
        .message-content li {
            margin: 4px 0;
        }
        
        .message-content code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }
        
        .message-content pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
        }
        
        .message-content blockquote {
            border-left: 4px solid #3498db;
            padding-left: 12px;
            margin: 8px 0;
            color: #666;
            font-style: italic;
        }
        
        .message-content strong {
            font-weight: 600;
        }
        
        .message-content em {
            font-style: italic;
        }
        
        .message-content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 12px 0;
        }
        
        .message-content a {
            color: #3498db;
            text-decoration: none;
        }
        
        .message-content a:hover {
            text-decoration: underline;
        }
        
        .message-content table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }
        
        .message-content th, .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        .message-content th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .message.user .message-content {
            background: #3498db;
            color: white;
        }
        
        .message.user .message-content code {
            background: rgba(255,255,255,0.2);
        }
        
        .message.user .message-content pre {
            background: rgba(0,0,0,0.1);
        }
        
        .message.assistant .message-content {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .message.error .message-content {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        
        .message-role {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 4px;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #3498db;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .send-btn:hover {
            background: #2980b9;
        }
        
        .send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* 模型配置页面样式 */
        .config-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 900px;
        }
        
        .config-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        .model-list {
            margin-bottom: 30px;
        }
        
        .model-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .model-card:hover {
            border-color: #3498db;
            background: #f8f9fa;
        }
        
        .model-card.active {
            border-color: #3498db;
            background: #e3f2fd;
        }
        
        .model-card-content {
            flex: 1;
        }
        
        .model-name {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .model-provider {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        
        .model-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #229954;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .add-model-section {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .add-model-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            flex: 1;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #34495e;
            font-size: 14px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .config-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .config-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            background: #27ae60;
        }
        
        .toast.error {
            background: #e74c3c;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #7f8c8d;
        }
        
        .loading.show {
            display: block;
        }
        
        .current-model-badge {
            background: #3498db;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        /* 知识库页面样式 */
        .knowledge-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .knowledge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        /* 知识库卡片样式 */
        .kb-list {
            margin-top: 20px;
        }
        
        .kb-card {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .kb-card:hover {
            background: #f0f0f0;
            border-color: #3498db;
        }
        
        .kb-card.selected {
            border-color: #27ae60;
            background: #e8f5e9;
        }
        
        .kb-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        .kb-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        
        .kb-info {
            flex: 1;
        }
        
        .kb-name {
            font-weight: 500;
            font-size: 16px;
            color: #2c3e50;
        }
        
        .kb-meta {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        
        .kb-actions {
            display: flex;
            gap: 8px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        
        .file-item:hover {
            background: #f0f0f0;
        }
        
        .file-icon {
            font-size: 24px;
            margin-right: 15px;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .file-meta {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        
        .file-actions {
            display: flex;
            gap: 8px;
        }
        
        .file-unsupported {
            color: #e74c3c;
            font-size: 12px;
        }
        
        .upload-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #ddd;
            text-align: center;
        }
        
        .upload-section.dragover {
            border-color: #3498db;
            background: #e3f2fd;
        }
        
        .upload-section input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #bdc3c7;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #7f8c8d;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .init-section {
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">zpp</div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-page="chat">
                <span class="menu-icon">💬</span>
                <span>对话</span>
            </div>
            <div class="menu-item" data-page="knowledge-list">
                <span class="menu-icon">📚</span>
                <span>知识库</span>
            </div>
            <div class="menu-item" data-page="config">
                <span class="menu-icon">⚙️</span>
                <span>模型配置</span>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div id="chat-page" class="page">
            <div class="content-header">对话 <span id="current-model-badge" class="current-model-badge"></span></div>
            <div class="content-area">
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <div class="message assistant">
                            <div class="message-role">助手</div>
                            <div class="message-content">你好！我是 AI 助手，有什么可以帮助你的吗？</div>
                        </div>
                    </div>
                    <div class="loading" id="chat-loading">正在思考中...</div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chat-input" placeholder="输入消息，按回车发送...">
                        <button class="send-btn" id="send-btn">发送</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 知识库列表页（一级页面） -->
        <div id="knowledge-list-page" class="page" style="display: none;">
            <div class="content-header">知识库</div>
            <div class="content-area">
                <div class="knowledge-container">
                    <div class="knowledge-header">
                        <h2 class="config-title">我的知识库</h2>
                        <button class="btn btn-success" id="create-kb-btn">+ 新建知识库</button>
                    </div>
                    
                    <!-- 新建知识库表单 -->
                    <div id="create-kb-form" style="display: none; margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                        <h3 style="margin-bottom: 15px;">新建知识库</h3>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label class="form-label">知识库名称</label>
                            <input type="text" class="form-input" id="new-kb-name" placeholder="输入知识库名称">
                        </div>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label class="form-label">描述（可选）</label>
                            <input type="text" class="form-input" id="new-kb-desc" placeholder="输入描述">
                        </div>
                        <button class="btn btn-success" id="confirm-create-kb">创建</button>
                        <button class="btn btn-secondary" id="cancel-create-kb">取消</button>
                    </div>
                    
                    <!-- 知识库列表 -->
                    <div class="kb-list" id="kb-list">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 知识库详情页（二级页面） -->
        <div id="knowledge-detail-page" class="page" style="display: none;">
            <div class="content-header">
                <button class="btn btn-secondary" id="back-to-kb-list" style="margin-right: 15px;">← 返回</button>
                <span id="kb-detail-title">知识库详情</span>
            </div>
            <div class="content-area">
                <div class="knowledge-container">
                    <div class="knowledge-header">
                        <h2 class="config-title">知识库文件</h2>
                        <div>
                            <button class="btn btn-primary" id="refresh-files-btn">刷新</button>
                            <button class="btn btn-success" id="init-knowledge-btn">初始化知识库</button>
                        </div>
                    </div>
                    
                    <div id="kb-info" style="margin-bottom: 15px; color: #7f8c8d; font-size: 14px;"></div>
                    
                    <!-- 文件列表 -->
                    <div class="file-list" id="knowledge-file-list">
                        <!-- 动态加载 -->
                    </div>
                    
                    <!-- 上传区域 -->
                    <div class="upload-section" id="upload-section">
                        <div class="upload-icon">📁</div>
                        <p>拖拽文件到此处或点击上传</p>
                        <input type="file" id="file-input" multiple>
                        <button class="btn btn-primary" id="select-file-btn">选择文件</button>
                        <p class="upload-hint">支持的格式: .txt, .md, .json, .py, .js, .html, .css, .docx</p>
                    </div>
                    
                    <!-- 初始化提示 -->
                    <div class="init-section" id="init-section" style="display: none;">
                        <p>文件已更新，请点击"初始化知识库"按钮更新向量数据库</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="config-page" class="page" style="display: none;">
            <div class="content-header">模型配置</div>
            <div class="content-area">
                <div class="config-container">
                    <h2 class="config-title">模型管理</h2>
                    
                    <!-- 已配置的模型列表 -->
                    <div class="model-list" id="model-list">
                        <!-- 动态加载 -->
                    </div>
                    
                    <!-- 添加新模型 -->
                    <div class="add-model-section">
                        <h3>添加新模型</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">提供商</label>
                                <select class="form-select" id="new-provider">
                                    <!-- 动态加载 -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">模型</label>
                                <select class="form-select" id="new-model-select">
                                    <!-- 动态加载 -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">显示名称</label>
                                <input type="text" class="form-input" id="new-display-name" placeholder="例如: 我的 GPT-4">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">API Key</label>
                                <input type="password" class="form-input" id="new-api-key" placeholder="请输入 API Key">
                            </div>
                            <div class="form-group">
                                <label class="form-label">API 基础地址（可选）</label>
                                <input type="text" class="form-input" id="new-api-base" placeholder="留空使用默认地址">
                            </div>
                        </div>
                        <button class="btn btn-success" id="add-model-btn">添加模型</button>
                    </div>
                    
                    <!-- 编辑当前选中模型的配置 -->
                    <div class="config-section" id="edit-section" style="display: none;">
                        <h3>编辑模型配置: <span id="edit-model-name"></span></h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">API Key</label>
                                <input type="password" class="form-input" id="edit-api-key" placeholder="请输入新的 API Key">
                            </div>
                            <div class="form-group">
                                <label class="form-label">API 基础地址</label>
                                <input type="text" class="form-input" id="edit-api-base" placeholder="API 基础地址">
                            </div>
                        </div>
                        <button class="btn btn-primary" id="save-config-btn">保存配置</button>
                        <button class="btn btn-secondary" id="cancel-edit-btn">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 应用状态
        const state = {
            currentPage: 'chat',
            messages: [],
            models: {},
            currentModel: '',
            providers: {},
            editingModel: null,
            knowledgeFiles: [],
            supportedExtensions: [],
            knowledgeBases: [],
            currentKbId: null
        };
        
        // DOM 元素
        const elements = {
            menuItems: document.querySelectorAll('.menu-item'),
            chatPage: document.getElementById('chat-page'),
            knowledgeListPage: document.getElementById('knowledge-list-page'),
            knowledgeDetailPage: document.getElementById('knowledge-detail-page'),
            configPage: document.getElementById('config-page'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            chatLoading: document.getElementById('chat-loading'),
            currentModelBadge: document.getElementById('current-model-badge'),
            modelList: document.getElementById('model-list'),
            newProvider: document.getElementById('new-provider'),
            newModelSelect: document.getElementById('new-model-select'),
            newDisplayName: document.getElementById('new-display-name'),
            newApiKey: document.getElementById('new-api-key'),
            newApiBase: document.getElementById('new-api-base'),
            addModelBtn: document.getElementById('add-model-btn'),
            editSection: document.getElementById('edit-section'),
            editModelName: document.getElementById('edit-model-name'),
            editApiKey: document.getElementById('edit-api-key'),
            editApiBase: document.getElementById('edit-api-base'),
            saveConfigBtn: document.getElementById('save-config-btn'),
            cancelEditBtn: document.getElementById('cancel-edit-btn'),
            // 知识库列表相关
            kbList: document.getElementById('kb-list'),
            createKbBtn: document.getElementById('create-kb-btn'),
            createKbForm: document.getElementById('create-kb-form'),
            newKbName: document.getElementById('new-kb-name'),
            newKbDesc: document.getElementById('new-kb-desc'),
            confirmCreateKb: document.getElementById('confirm-create-kb'),
            cancelCreateKb: document.getElementById('cancel-create-kb'),
            // 知识库详情相关
            backToKbList: document.getElementById('back-to-kb-list'),
            kbDetailTitle: document.getElementById('kb-detail-title'),
            knowledgeFileList: document.getElementById('knowledge-file-list'),
            kbInfo: document.getElementById('kb-info'),
            refreshFilesBtn: document.getElementById('refresh-files-btn'),
            initKnowledgeBtn: document.getElementById('init-knowledge-btn'),
            uploadSection: document.getElementById('upload-section'),
            fileInput: document.getElementById('file-input'),
            selectFileBtn: document.getElementById('select-file-btn'),
            initSection: document.getElementById('init-section'),
            toast: document.getElementById('toast')
        };
        
        // 显示提示消息
        function showToast(message, type = 'success') {
            elements.toast.textContent = message;
            elements.toast.className = `toast ${type} show`;
            setTimeout(() => {
                elements.toast.classList.remove('show');
            }, 3000);
        }
        
        // 切换页面
        function switchPage(page) {
            state.currentPage = page;
            
            // 隐藏所有页面
            elements.chatPage.style.display = 'none';
            elements.knowledgeListPage.style.display = 'none';
            elements.knowledgeDetailPage.style.display = 'none';
            elements.configPage.style.display = 'none';
            
            // 显示目标页面
            if (page === 'chat') {
                elements.chatPage.style.display = 'flex';
                updateCurrentModelBadge();
            } else if (page === 'knowledge-list') {
                elements.knowledgeListPage.style.display = 'flex';
                loadKnowledgeBases();
            } else if (page === 'knowledge-detail') {
                elements.knowledgeDetailPage.style.display = 'flex';
            } else if (page === 'config') {
                elements.configPage.style.display = 'flex';
                loadProviders();
                loadModels();
            }
            
            // 更新菜单高亮
            elements.menuItems.forEach(item => {
                const itemPage = item.dataset.page;
                if (itemPage === 'knowledge' && (page === 'knowledge-list' || page === 'knowledge-detail')) {
                    item.classList.add('active');
                } else {
                    item.classList.toggle('active', itemPage === page);
                }
            });
        }
        
        // 加载提供商列表
        async function loadProviders() {
            try {
                const response = await fetch('/api/providers');
                state.providers = await response.json();
                
                // 填充提供商下拉框
                elements.newProvider.innerHTML = '';
                for (const [key, provider] of Object.entries(state.providers)) {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = provider.name;
                    elements.newProvider.appendChild(option);
                }
                
                // 加载第一个提供商的模型列表
                updateModelSelect();
            } catch (error) {
                showToast('加载提供商失败', 'error');
            }
        }
        
        // 更新模型下拉框
        function updateModelSelect() {
            const provider = elements.newProvider.value;
            const providerInfo = state.providers[provider] || {};
            const models = providerInfo.models || [];
            
            elements.newModelSelect.innerHTML = '';
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                elements.newModelSelect.appendChild(option);
            });
        }
        
        // 加载模型列表
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                state.models = data.models;
                state.currentModel = data.current_model;
                
                renderModelList();
            } catch (error) {
                showToast('加载模型列表失败', 'error');
            }
        }
        
        // 渲染模型列表
        function renderModelList() {
            if (Object.keys(state.models).length === 0) {
                elements.modelList.innerHTML = '<div class="empty-state">暂无模型配置，请添加新模型</div>';
                return;
            }
            
            elements.modelList.innerHTML = '';
            for (const [modelId, config] of Object.entries(state.models)) {
                const isActive = modelId === state.currentModel;
                const card = document.createElement('div');
                card.className = `model-card ${isActive ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="model-card-content">
                        <div class="model-name">${config.display_name || modelId} ${isActive ? '<span class="current-model-badge">当前使用</span>' : ''}</div>
                        <div class="model-provider">${config.model}</div>
                    </div>
                    <div class="model-actions">
                        ${!isActive ? `<button class="btn btn-primary use-model-btn" data-id="${modelId}">使用</button>` : ''}
                        <button class="btn btn-secondary edit-model-btn" data-id="${modelId}">编辑</button>
                        <button class="btn btn-danger delete-model-btn" data-id="${modelId}">删除</button>
                    </div>
                `;
                elements.modelList.appendChild(card);
            }
            
            // 绑定事件
            document.querySelectorAll('.use-model-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setCurrentModel(btn.dataset.id);
                });
            });
            
            document.querySelectorAll('.edit-model-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editModel(btn.dataset.id);
                });
            });
            
            document.querySelectorAll('.delete-model-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteModel(btn.dataset.id);
                });
            });
        }
        
        // 设置当前模型
        async function setCurrentModel(modelId) {
            try {
                const response = await fetch('/api/models/current', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model_id: modelId })
                });
                
                const result = await response.json();
                if (result.success) {
                    state.currentModel = modelId;
                    renderModelList();
                    updateCurrentModelBadge();
                    showToast('已切换模型');
                }
            } catch (error) {
                showToast('切换模型失败', 'error');
            }
        }
        
        // 编辑模型
        async function editModel(modelId) {
            state.editingModel = modelId;
            const config = state.models[modelId];
            
            elements.editModelName.textContent = config.display_name || modelId;
            elements.editApiKey.value = '';
            elements.editApiKey.placeholder = config.api_key_display || '请输入新的 API Key';
            elements.editApiBase.value = config.api_base || '';
            
            elements.editSection.style.display = 'block';
        }
        
        // 保存模型配置
        async function saveModelConfig() {
            if (!state.editingModel) return;
            
            const config = {
                api_key: elements.editApiKey.value,
                api_base: elements.editApiBase.value
            };
            
            try {
                const response = await fetch(`/api/models/${state.editingModel}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('配置保存成功');
                    loadModels();
                    elements.editSection.style.display = 'none';
                    state.editingModel = null;
                }
            } catch (error) {
                showToast('保存配置失败', 'error');
            }
        }
        
        // 删除模型
        async function deleteModel(modelId) {
            if (!confirm('确定要删除此模型配置吗？')) return;
            
            try {
                const response = await fetch(`/api/models/${modelId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('模型已删除');
                    loadModels();
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }
        
        // 添加新模型
        async function addModel() {
            const provider = elements.newProvider.value;
            const model = elements.newModelSelect.value;
            const displayName = elements.newDisplayName.value || model;
            const apiKey = elements.newApiKey.value;
            const apiBase = elements.newApiBase.value;
            
            const modelId = `${provider}-${Date.now()}`;
            const modelName = provider === 'openai' ? model : `${provider}/${model}`;
            
            try {
                const response = await fetch('/api/models', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_id: modelId,
                        provider: provider,
                        display_name: displayName,
                        model: modelName,
                        api_key: apiKey,
                        api_base: apiBase
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('模型添加成功');
                    loadModels();
                    // 清空表单
                    elements.newDisplayName.value = '';
                    elements.newApiKey.value = '';
                    elements.newApiBase.value = '';
                }
            } catch (error) {
                showToast('添加失败', 'error');
            }
        }
        
        // 更新当前模型标签
        function updateCurrentModelBadge() {
            if (state.currentModel && state.models[state.currentModel]) {
                elements.currentModelBadge.textContent = state.models[state.currentModel].display_name || state.currentModel;
            } else {
                elements.currentModelBadge.textContent = '未配置';
            }
        }
        
        // 添加消息到聊天界面
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            let roleText = '助手';
            if (role === 'user') {
                roleText = '你';
            } else if (role === 'error') {
                roleText = '错误';
            }
            
            // 解析 Markdown（仅对助手消息）
            let displayContent = content;
            if (role === 'assistant' || role === 'error') {
                try {
                    // 使用 marked 解析 Markdown
                    displayContent = marked.parse(content, {
                        breaks: true,  // 支持换行
                        gfm: true      // 支持 GitHub 风格 Markdown
                    });
                } catch (e) {
                    displayContent = content;
                }
            } else {
                // 用户消息转义 HTML
                displayContent = escapeHtml(content);
            }
            
            messageDiv.innerHTML = `
                <div class="message-role">${roleText}</div>
                <div class="message-content">${displayContent}</div>
            `;
            
            elements.chatMessages.appendChild(messageDiv);
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }
        
        // HTML 转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 发送消息
        async function sendMessage() {
            const input = elements.chatInput.value.trim();
            if (!input) return;
            
            state.messages.push({
                role: 'user',
                content: input
            });
            addMessage('user', input);
            
            elements.chatInput.value = '';
            elements.sendBtn.disabled = true;
            elements.chatLoading.classList.add('show');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: state.messages })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    state.messages.push({
                        role: 'assistant',
                        content: result.response
                    });
                    addMessage('assistant', result.response);
                } else {
                    const errorMsg = result.error || '对话失败';
                    addMessage('error', errorMsg);
                    showToast(errorMsg, 'error');
                }
            } catch (error) {
                const errorMsg = '对话失败，请检查网络连接';
                addMessage('error', errorMsg);
                showToast(errorMsg, 'error');
            } finally {
                elements.sendBtn.disabled = false;
                elements.chatLoading.classList.remove('show');
            }
        }
        
        // 事件监听
        elements.menuItems.forEach(item => {
            item.addEventListener('click', () => {
                switchPage(item.dataset.page);
            });
        });
        
        elements.sendBtn.addEventListener('click', sendMessage);
        
        elements.chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        elements.newProvider.addEventListener('change', updateModelSelect);
        
        elements.addModelBtn.addEventListener('click', addModel);
        
        elements.saveConfigBtn.addEventListener('click', saveModelConfig);
        
        elements.cancelEditBtn.addEventListener('click', () => {
            elements.editSection.style.display = 'none';
            state.editingModel = null;
        });
        
        // ========== 知识库管理 ==========
        
        // 加载知识库列表
        async function loadKnowledgeBases() {
            try {
                const response = await fetch('/api/knowledge/bases');
                const data = await response.json();
                state.knowledgeBases = data.bases || [];
                renderKnowledgeBases();
            } catch (error) {
                showToast('加载知识库列表失败', 'error');
            }
        }
        
        // 渲染知识库列表
        function renderKnowledgeBases() {
            if (state.knowledgeBases.length === 0) {
                elements.kbList.innerHTML = '<div class="empty-state">暂无知识库，点击"新建知识库"创建</div>';
                return;
            }
            
            elements.kbList.innerHTML = '';
            
            state.knowledgeBases.forEach(kb => {
                const card = document.createElement('div');
                card.className = `kb-card ${kb.selected ? 'selected' : ''}`;
                
                const statusText = kb.initialized ? `已初始化 (${kb.chunk_count} 个文本块)` : '未初始化';
                
                card.innerHTML = `
                    <input type="checkbox" class="kb-checkbox" data-id="${kb.id}" ${kb.selected ? 'checked' : ''}>
                    <div class="kb-icon">📚</div>
                    <div class="kb-info">
                        <div class="kb-name">${kb.name}</div>
                        <div class="kb-meta">${kb.description || '无描述'} | ${kb.file_count || 0} 个文件 | ${statusText}</div>
                    </div>
                    <div class="kb-actions">
                        <button class="btn btn-primary open-kb-btn" data-id="${kb.id}" data-name="${kb.name}">打开</button>
                        <button class="btn btn-danger delete-kb-btn" data-id="${kb.id}">删除</button>
                    </div>
                `;
                
                elements.kbList.appendChild(card);
            });
            
            // 绑定事件
            document.querySelectorAll('.kb-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    e.stopPropagation();
                    selectKnowledgeBase(e.target.dataset.id, e.target.checked);
                });
            });
            
            document.querySelectorAll('.open-kb-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openKnowledgeBase(btn.dataset.id, btn.dataset.name);
                });
            });
            
            document.querySelectorAll('.delete-kb-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteKnowledgeBase(btn.dataset.id);
                });
            });
        }
        
        // 创建知识库
        async function createKnowledgeBase() {
            const name = elements.newKbName.value.trim();
            const desc = elements.newKbDesc.value.trim();
            
            if (!name) {
                showToast('请输入知识库名称', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/knowledge/bases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('知识库创建成功');
                    elements.createKbForm.style.display = 'none';
                    elements.newKbName.value = '';
                    elements.newKbDesc.value = '';
                    loadKnowledgeBases();
                } else {
                    showToast(result.error || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败', 'error');
            }
        }
        
        // 删除知识库
        async function deleteKnowledgeBase(baseId) {
            if (!confirm('确定要删除此知识库吗？所有文件和向量数据将被删除！')) return;
            
            try {
                const response = await fetch(`/api/knowledge/bases/${baseId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('知识库已删除');
                    loadKnowledgeBases();
                } else {
                    showToast(result.error || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }
        
        // 选择/取消选择知识库
        async function selectKnowledgeBase(baseId, selected) {
            try {
                const response = await fetch(`/api/knowledge/bases/${baseId}/select`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selected })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(selected ? '已选中知识库' : '已取消选中');
                    loadKnowledgeBases();
                }
            } catch (error) {
                showToast('操作失败', 'error');
            }
        }
        
        // 打开知识库详情
        function openKnowledgeBase(baseId, baseName) {
            state.currentKbId = baseId;
            elements.kbDetailTitle.textContent = baseName;
            switchPage('knowledge-detail');
            loadKnowledgeFilesForBase(baseId);
        }
        
        // 加载知识库文件列表
        async function loadKnowledgeFilesForBase(baseId) {
            if (!baseId) baseId = state.currentKbId;
            if (!baseId) return;
            
            try {
                const response = await fetch(`/api/knowledge/bases/${baseId}/files`);
                const data = await response.json();
                
                state.knowledgeFiles = data.files || [];
                state.supportedExtensions = data.supported_extensions || [];
                
                const baseInfo = data.base_info || {};
                elements.kbInfo.textContent = `${baseInfo.name || '知识库'} | ${baseInfo.file_count || 0} 个文件`;
                
                renderKnowledgeFiles();
            } catch (error) {
                showToast('加载文件列表失败', 'error');
            }
        }
        
        // 加载知识库文件列表（兼容旧代码）
        async function loadKnowledgeFiles() {
            if (state.currentKbId) {
                loadKnowledgeFilesForBase(state.currentKbId);
            }
        }
        
        // 渲染知识库文件列表
        function renderKnowledgeFiles() {
            if (state.knowledgeFiles.length === 0) {
                elements.knowledgeFileList.innerHTML = '<div class="empty-state">知识库为空，请上传文件</div>';
                return;
            }
            
            elements.knowledgeFileList.innerHTML = '';
            
            state.knowledgeFiles.forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                
                const icon = getFileIcon(file.extension);
                const supported = file.supported ? '' : '<span class="file-unsupported">（不支持）</span>';
                
                fileItem.innerHTML = `
                    <div class="file-icon">${icon}</div>
                    <div class="file-info">
                        <div class="file-name">${file.name} ${supported}</div>
                        <div class="file-meta">${file.size_display} | ${file.extension}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-danger delete-file-btn" data-name="${file.name}">删除</button>
                    </div>
                `;
                
                elements.knowledgeFileList.appendChild(fileItem);
            });
            
            // 绑定删除事件
            document.querySelectorAll('.delete-file-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteKnowledgeFile(btn.dataset.name));
            });
        }
        
        // 获取文件图标
        function getFileIcon(ext) {
            const icons = {
                '.txt': '📄',
                '.md': '📝',
                '.json': '📋',
                '.py': '🐍',
                '.js': '📜',
                '.html': '🌐',
                '.css': '🎨',
                '.docx': '📕'
            };
            return icons[ext] || '📄';
        }
        
        // 删除知识库文件
        async function deleteKnowledgeFile(filename) {
            if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return;
            
            if (!state.currentKbId) {
                showToast('请先选择知识库', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/knowledge/bases/${state.currentKbId}/files/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('文件已删除');
                    loadKnowledgeFilesForBase(state.currentKbId);
                    elements.initSection.style.display = 'block';
                } else {
                    showToast(result.error || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }
        
        // 上传文件
        async function uploadFiles(files) {
            if (!state.currentKbId) {
                showToast('请先选择知识库', 'error');
                return;
            }
            
            const formData = new FormData();
            let hasValidFiles = false;
            
            for (const file of files) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (state.supportedExtensions.includes(ext)) {
                    formData.append('file', file);
                    hasValidFiles = true;
                } else {
                    showToast(`不支持的文件格式: ${file.name}`, 'error');
                }
            }
            
            if (!hasValidFiles) return;
            
            try {
                const response = await fetch(`/api/knowledge/bases/${state.currentKbId}/files`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('文件上传成功');
                    loadKnowledgeFiles();
                    elements.initSection.style.display = 'block';
                } else {
                    showToast(result.error || '上传失败', 'error');
                }
            } catch (error) {
                showToast('上传失败', 'error');
            }
        }
        
        // 初始化知识库
        async function initKnowledge() {
            if (!state.currentKbId) {
                showToast('请先选择知识库', 'error');
                return;
            }
            
            elements.initKnowledgeBtn.disabled = true;
            elements.initKnowledgeBtn.textContent = '初始化中...';
            
            try {
                const response = await fetch(`/api/knowledge/bases/${state.currentKbId}/init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`知识库初始化成功，处理了 ${result.file_count} 个文件，${result.chunk_count} 个文本块`);
                    elements.initSection.style.display = 'none';
                } else {
                    showToast(result.error || '初始化失败', 'error');
                }
            } catch (error) {
                showToast('初始化失败', 'error');
            } finally {
                elements.initKnowledgeBtn.disabled = false;
                elements.initKnowledgeBtn.textContent = '初始化知识库';
            }
        }
        
        // 知识库列表事件监听
        elements.createKbBtn.addEventListener('click', () => {
            elements.createKbForm.style.display = 'block';
        });
        
        elements.cancelCreateKb.addEventListener('click', () => {
            elements.createKbForm.style.display = 'none';
            elements.newKbName.value = '';
            elements.newKbDesc.value = '';
        });
        
        elements.confirmCreateKb.addEventListener('click', createKnowledgeBase);
        
        // 知识库详情事件监听
        elements.backToKbList.addEventListener('click', () => {
            state.currentKbId = null;
            switchPage('knowledge-list');
        });
        
        elements.refreshFilesBtn.addEventListener('click', () => {
            if (state.currentKbId) {
                loadKnowledgeFilesForBase(state.currentKbId);
            }
        });
        
        elements.initKnowledgeBtn.addEventListener('click', initKnowledge);
        
        elements.selectFileBtn.addEventListener('click', () => {
            elements.fileInput.click();
        });
        
        elements.fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFiles(e.target.files);
                e.target.value = '';
            }
        });
        
        // 拖拽上传
        elements.uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.uploadSection.classList.add('dragover');
        });
        
        elements.uploadSection.addEventListener('dragleave', () => {
            elements.uploadSection.classList.remove('dragover');
        });
        
        elements.uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.uploadSection.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                uploadFiles(e.dataTransfer.files);
            }
        });
        
        // 初始化
        (async function init() {
            await loadModels();
            updateCurrentModelBadge();
            switchPage('chat');
        })();
    </script>
</body>
</html>
